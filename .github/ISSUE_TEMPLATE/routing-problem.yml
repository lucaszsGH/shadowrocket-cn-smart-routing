name: 分流问题
description: 反馈国内 DIRECT、海外 PROXY 或局域网分流异常，不要提交隐私数据
title: "[分流问题] "
body:
  - type: markdown
    attributes:
      value: |
        谢谢你帮助改进 CN Direct。只需描述公开服务和看到的现象。

        **不要粘贴机场订阅、节点详情、二维码、账号凭证、公网 IP 或完整 Shadowrocket 日志。**
  - type: dropdown
    id: route
    attributes:
      label: 你希望它走哪条路径？
      options:
        - 中国大陆服务应走 DIRECT
        - 海外服务应走 PROXY
        - 局域网服务应走 DIRECT
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: 使用设备
      options:
        - iPhone 或 iPad
        - macOS
        - 其他或不确定
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 配置版本或提交号
      description: 可在配置列表点击文件名称，再选择“预览”查看顶部版本。
      placeholder: 例如 0.2.0 或短 Git 提交号
    validations:
      required: true
  - type: input
    id: service
    attributes:
      label: 公开服务名或公开域名
      description: 只填写公开服务或公开域名，不要填写私有主机。
      placeholder: 例如 某服务 或 example.com
    validations:
      required: true
  - type: textarea
    id: observation
    attributes:
      label: 实际发生了什么？
      description: 描述你看到的现象和 Shadowrocket 显示的路径；请先删除所有个人信息。
      placeholder: 例如：配置模式下无法打开；切回原配置恢复。Shadowrocket 显示走 PROXY。
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: 已经做过哪些检查？
      placeholder: 已开启配置模式；已点击更新；在 Wi-Fi 或 5G 上复现
  - type: checkboxes
    id: privacy
    attributes:
      label: 提交前确认
      options:
        - label: 我已经删除订阅、节点、二维码、凭证、公网 IP 和完整日志。
          required: true
