name: 规则建议
description: 建议一个公开的中国大陆 DIRECT 或海外 PROXY 规则
title: "[规则建议] "
body:
  - type: markdown
    attributes:
      value: |
        只提交公开服务域名。不要提交机场订阅、节点、凭证、私有主机或完整日志。
  - type: dropdown
    id: route
    attributes:
      label: 建议路径
      options:
        - DIRECT
        - PROXY
    validations:
      required: true
  - type: input
    id: service
    attributes:
      label: 公开服务名称
      placeholder: 例如 某银行、某办公工具或某海外服务
    validations:
      required: true
  - type: textarea
    id: domains
    attributes:
      label: 公开域名
      description: 每行一个公开域名。不要包含带 Token 或查询参数的完整 URL。
      render: text
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: 为什么应该加入公共配置？
      description: 说明它属于中国大陆服务、海外服务还是局域网依赖，以及错误分流造成的影响。
    validations:
      required: true
  - type: checkboxes
    id: evidence
    attributes:
      label: 提交前确认
      options:
        - label: 这些是公开域名，内容不含订阅、节点、凭证、公网 IP 或完整日志。
          required: true
        - label: 我理解规则仍需验证，不保证一定合并。
          required: true
