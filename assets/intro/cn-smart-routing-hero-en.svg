  <rect x="1045" y="515" width="310" height="100" rx="14" fill="#FFFFFF" stroke="#E1E6EE" stroke-width="1.5"/><text x="1070" y="551" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="600" font-size="19" fill="#101722">Overseas</text><text x="1070" y="585" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="400" font-size="15" fill="#5C626B">AI · developer · unmatched</text><text x="1330" y="571" text-anchor="end" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="700" font-size="13" fill="#0071E3" letter-spacing="1.2">PROXY</text>
  <text x="1200" y="653" text-anchor="middle" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="600" font-size="16" fill="#101722">Manual home-screen node</text>
