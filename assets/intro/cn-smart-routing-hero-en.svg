  <text x="1045" y="334" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="700" font-size="13" fill="#5C626B" letter-spacing="1.7">ONE RULE SET · TWO PATHS</text>
  <rect x="1045" y="370" width="310" height="100" rx="14" fill="#F2F5F9"/><text x="1070" y="406" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="600" font-size="19" fill="#101722">Mainland China</text><text x="1070" y="440" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="400" font-size="15" fill="#5C626B">Apps · domains · IPs · LAN</text><text x="1330" y="426" text-anchor="end" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="700" font-size="13" fill="#5C626B" letter-spacing="1.2">DIRECT</text>
