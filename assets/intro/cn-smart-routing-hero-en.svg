<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CN Direct by DeepWheel GitHub introduction</title>
  <desc id="desc">Keep Shadowrocket on while mainland office, banking, media and gaming traffic is routed directly and overseas AI and developer services follow the manually selected node.</desc>
  <defs>
    <radialGradient id="aura" cx="100%" cy="0%" r="135%">
      <stop offset="0%" stop-color="#DFEAF7"/><stop offset="26%" stop-color="#ECF2FB"/><stop offset="55%" stop-color="#F6F9FC"/><stop offset="100%" stop-color="#FBFBFB"/>
    </radialGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#101722" flood-opacity=".04"/><feDropShadow dx="0" dy="14" stdDeviation="17" flood-color="#101722" flood-opacity=".07"/>
    </filter>
  </defs>
