  <text x="1494" y="118" text-anchor="end" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="600" font-size="13" fill="#5C626B" letter-spacing="2.6">SHADOWROCKET ROUTING</text><line x1="106" y1="158" x2="1494" y2="158" stroke="#E1E6EE"/>
  <text x="112" y="226" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="700" font-size="14" fill="#5C626B" letter-spacing="2.4">CN DIRECT BY DEEPWHEEL</text>
  <text x="112" y="292" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="600" font-size="48" fill="#101722" letter-spacing="-1">Mainland direct. Overseas proxied.</text>
  <text x="112" y="350" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="400" font-size="26" fill="#42474F">Install once. After that, just choose your node.</text>
  <text x="112" y="402" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="400" font-size="20" fill="#5C626B">One transparent Shadowrocket config. No bundled nodes.</text>
  <line x1="112" y1="448" x2="880" y2="448" stroke="#E1E6EE" stroke-width="1.5"/>
  <text x="112" y="497" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="600" font-size="18" fill="#101722">Mainland traffic</text><text x="292" y="497" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="400" font-size="17" fill="#42474F">office · banking · payments · media · games · LAN</text><text x="833" y="497" text-anchor="end" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="700" font-size="15" fill="#5C626B" letter-spacing="1.3">DIRECT</text>
  <line x1="112" y1="526" x2="880" y2="526" stroke="#E1E6EE"/>
  <text x="112" y="575" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="600" font-size="18" fill="#101722">Overseas traffic</text><text x="292" y="575" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="400" font-size="17" fill="#42474F">AI · GitHub · developer tools · unmatched sites</text><text x="833" y="575" text-anchor="end" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="700" font-size="15" fill="#0071E3" letter-spacing="1.3">PROXY</text>
  <line x1="112" y1="625" x2="880" y2="625" stroke="#E1E6EE" stroke-width="1.5"/>
  <text x="112" y="676" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="600" font-size="18" fill="#101722">You still choose the node</text><text x="112" y="711" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="400" font-size="16" fill="#5C626B">No bundled nodes. No automatic country selection. Home-screen choice stays in control.</text>
  <text x="112" y="760" font-family="'Avenir Next','Inter',Arial,sans-serif" font-weight="400" font-size="14" fill="#5C626B">No subscription · No HTTPS decryption · No account or browsing-data collection</text>
