<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">CN Direct by DeepWheel 中文共创流程</title>
  <desc id="desc">用户发现分流问题后提交公开服务名和现象，自动检查与维护者审核负责把关，正式更新继续通过原有稳定地址交付。</desc>
  <defs><radialGradient id="aura" cx="100%" cy="0%" r="135%"><stop offset="0%" stop-color="#DFEAF7"/><stop offset="30%" stop-color="#ECF2FB"/><stop offset="65%" stop-color="#F6F9FC"/><stop offset="100%" stop-color="#FBFBFB"/></radialGradient><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#101722" flood-opacity=".04"/><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#101722" flood-opacity=".07"/></filter></defs>
  <rect width="1200" height="1500" fill="url(#aura)"/><rect x="44" y="44" width="1112" height="1412" rx="34" fill="#FFFFFF" filter="url(#shadow)"/>
  <g transform="translate(82 68) scale(.34)"><path fill="#101722" d="M37 115V68C37 46 55 28 76 28H153C159 28 162 32 162 38V113C162 135 145 151 124 151H115C111 151 108 148 108 144V130C108 126 111 123 115 123H123C129 123 132 119 132 113V63C132 59 129 56 125 56H79C72 56 67 61 67 68V113C67 116 65 117 62 117H39C38 117 37 116 37 115Z"/><circle cx="87.5" cy="137.5" r="14.99" fill="#0071E3"/></g>
  <text x="166" y="116" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="25" fill="#101722">Deep<tspan fill="#0071E3">Wheel</tspan></text><text x="1118" y="112" text-anchor="end" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="14" fill="#5C626B" letter-spacing="2.4">COMMUNITY FLOW</text><line x1="82" y1="150" x2="1118" y2="150" stroke="#E1E6EE"/>
  <text x="82" y="224" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#5C626B" letter-spacing="2.4">SIMPLE TO REPORT · SAFE TO SHARE</text>
  <text x="82" y="304" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="58" fill="#101722">哪里不好用，</text>
  <text x="82" y="372" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="58" fill="#101722">告诉我们就够。</text>
  <text x="82" y="422" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="23" fill="#42474F">你描述现象；项目负责检查、审核和更新。</text>

  <rect x="82" y="486" width="1036" height="206" rx="22" fill="#FFFFFF" stroke="#0071E3" stroke-width="3"/><rect x="82" y="486" width="12" height="206" rx="6" fill="#0071E3"/>
  <text x="126" y="540" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#0071E3" letter-spacing="1.8">你来完成</text>
  <text x="126" y="598" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="34" fill="#101722">提交中文分流问题</text>
  <text x="126" y="644" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="21" fill="#42474F">只写公开服务名、期望 DIRECT / PROXY 和看到的现象。</text>

  <line x1="600" y1="692" x2="600" y2="732" stroke="#E1E6EE" stroke-width="3"/><path d="M590 722 L600 734 L610 722" fill="none" stroke="#AEB6C2" stroke-width="3"/>
  <rect x="82" y="734" width="1036" height="206" rx="22" fill="#F2F5F9"/>
  <text x="118" y="788" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#5C626B" letter-spacing="1.8">项目自动完成</text>
  <text x="118" y="846" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="34" fill="#101722">结构、优先级与隐私检查</text>
  <text x="118" y="892" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="21" fill="#42474F">先拦住失效配置、错误分流和常见敏感信息。</text>

  <line x1="600" y1="940" x2="600" y2="980" stroke="#E1E6EE" stroke-width="3"/><path d="M590 970 L600 982 L610 970" fill="none" stroke="#AEB6C2" stroke-width="3"/>
  <rect x="82" y="982" width="1036" height="206" rx="22" fill="#F2F5F9"/>
  <text x="118" y="1036" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#5C626B" letter-spacing="1.8">维护者完成</text>
  <text x="118" y="1094" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="34" fill="#101722">复核影响，再发布正式更新</text>
  <text x="118" y="1140" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="21" fill="#42474F">已安装用户继续沿用原有 URL 获取新版本。</text>

  <rect x="82" y="1232" width="1036" height="112" rx="22" fill="#F2F5F9"/>
  <text x="118" y="1282" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="23" fill="#101722">提交前，先保护自己</text>
  <text x="118" y="1318" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="18" fill="#5C626B">不上传订阅、节点、二维码、账号、公网 IP 或完整日志。</text>
  <line x1="82" y1="1380" x2="1118" y2="1380" stroke="#E1E6EE"/>
  <text x="82" y="1420" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="18" fill="#42474F">Issue 适合反馈问题 · Pull Request 适合提交可验证改进</text>
</svg>
