<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">CN Direct by DeepWheel 中文消费者主图</title>
  <desc id="desc">小火箭保持开启，中国大陆应用和局域网优先直连，海外服务跟随首页手动选择的节点代理，并展示规则覆盖与隐私边界。</desc>
