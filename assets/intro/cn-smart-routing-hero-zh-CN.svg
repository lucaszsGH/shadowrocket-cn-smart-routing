    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#101722" flood-opacity=".04"/><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#101722" flood-opacity=".07"/></filter>
  </defs>
