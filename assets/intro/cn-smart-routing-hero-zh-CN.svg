  <text x="1112" y="112" text-anchor="end" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="14" fill="#5C626B" letter-spacing="2.5">CN DIRECT · SHADOWROCKET</text>
  <line x1="82" y1="150" x2="1118" y2="150" stroke="#E1E6EE"/>

  <text x="82" y="224" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#5C626B" letter-spacing="2.4">ALWAYS ON · MAINLAND FIRST</text>
  <text x="82" y="306" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="62" fill="#101722" letter-spacing="-1.5">小火箭一直开。</text>
  <text x="82" y="384" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="62" fill="#101722" letter-spacing="-1.5">国内应用照常用。</text>
  <text x="82" y="438" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="400" font-size="25" fill="#42474F">一份配置，分开国内与海外；节点仍由你在首页选择。</text>

