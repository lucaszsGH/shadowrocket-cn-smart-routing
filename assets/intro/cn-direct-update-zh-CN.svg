<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">CN Direct by DeepWheel 更新指引</title>
  <desc id="desc">配置使用同一稳定地址；开启后台配置更新与提醒，需要立即检查时点击配置名称，选择更新并预览版本。</desc>
  <defs><radialGradient id="aura" cx="100%" cy="0%" r="135%"><stop offset="0%" stop-color="#DFEAF7"/><stop offset="30%" stop-color="#ECF2FB"/><stop offset="65%" stop-color="#F6F9FC"/><stop offset="100%" stop-color="#FBFBFB"/></radialGradient><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#101722" flood-opacity=".04"/><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#101722" flood-opacity=".07"/></filter></defs>
  <rect width="1200" height="1500" fill="url(#aura)"/><rect x="44" y="44" width="1112" height="1412" rx="34" fill="#FFFFFF" filter="url(#shadow)"/>
  <g transform="translate(82 68) scale(.34)"><path fill="#101722" d="M37 115V68C37 46 55 28 76 28H153C159 28 162 32 162 38V113C162 135 145 151 124 151H115C111 151 108 148 108 144V130C108 126 111 123 115 123H123C129 123 132 119 132 113V63C132 59 129 56 125 56H79C72 56 67 61 67 68V113C67 116 65 117 62 117H39C38 117 37 116 37 115Z"/><circle cx="87.5" cy="137.5" r="14.99" fill="#0071E3"/></g>
  <text x="166" y="116" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="25" fill="#101722">Deep<tspan fill="#0071E3">Wheel</tspan></text><text x="1118" y="112" text-anchor="end" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="14" fill="#5C626B" letter-spacing="2.4">CONFIG UPDATE</text><line x1="82" y1="150" x2="1118" y2="150" stroke="#E1E6EE"/>
  <text x="82" y="224" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#5C626B" letter-spacing="2.4">SAME URL · LATEST STABLE</text>
  <text x="82" y="304" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="58" fill="#101722">地址不变。</text>
  <text x="82" y="372" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="58" fill="#101722">更新更省事。</text>
  <text x="82" y="422" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="23" fill="#42474F">系统决定后台时机；需要时，随时手动检查。</text>

  <rect x="82" y="486" width="1036" height="260" rx="22" fill="#F2F5F9"/>
  <text x="118" y="540" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#5C626B" letter-spacing="1.8">第一次设置</text>
  <text x="118" y="596" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="32" fill="#101722">设置 → 订阅 → 配置</text>
  <text x="118" y="646" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="21" fill="#42474F">自动后台更新：开启　　更新提醒：开启</text>
  <text x="118" y="688" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="21" fill="#42474F">更新间隔：3 天　　　 系统通知与后台刷新：允许</text>

  <line x1="600" y1="746" x2="600" y2="786" stroke="#E1E6EE" stroke-width="3"/><path d="M590 776 L600 788 L610 776" fill="none" stroke="#AEB6C2" stroke-width="3"/>
  <rect x="82" y="788" width="1036" height="312" rx="22" fill="#FFFFFF" stroke="#0071E3" stroke-width="3"/><rect x="82" y="788" width="12" height="312" rx="6" fill="#0071E3"/>
  <text x="126" y="846" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#0071E3" letter-spacing="1.8">需要立即检查</text>
  <text x="126" y="910" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="36" fill="#101722">点击配置文件名称</text>
  <text x="126" y="960" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="21" fill="#42474F">在弹出的菜单里依次选择：</text>
  <rect x="126" y="1002" width="210" height="64" rx="32" fill="#0071E3"/><text x="231" y="1042" text-anchor="middle" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="22" fill="#FFFFFF">更新</text>
  <path d="M366 1034 H420" stroke="#AEB6C2" stroke-width="3"/><path d="M410 1024 L422 1034 L410 1044" fill="none" stroke="#AEB6C2" stroke-width="3"/>
  <rect x="452" y="1002" width="210" height="64" rx="32" fill="#F2F5F9"/><text x="557" y="1042" text-anchor="middle" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="22" fill="#101722">预览</text>
  <text x="1080" y="1042" text-anchor="end" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="18" fill="#5C626B">核对顶部版本号</text>

  <rect x="82" y="1144" width="1036" height="176" rx="22" fill="#F2F5F9"/>
  <text x="118" y="1200" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="28" fill="#101722">三件事，别混淆</text>
  <text x="118" y="1250" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="20" fill="#42474F"><tspan font-weight="600">URL</tspan> 获取配置　　<tspan font-weight="600">Star</tspan> 收藏项目　　<tspan font-weight="600">Watch Releases</tspan> 接收版本说明</text>

  <line x1="82" y1="1362" x2="1118" y2="1362" stroke="#E1E6EE"/>
  <text x="82" y="1408" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="19" fill="#42474F">强制退出 App、关闭后台刷新时，后台更新可能延后。</text>
</svg>
