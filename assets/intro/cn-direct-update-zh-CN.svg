<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CN Direct by DeepWheel 中文更新指引</title>
  <desc id="desc">开启Shadowrocket配置后台更新；需要手动检查时点击配置名称，再点击更新，并通过预览核对版本。</desc>
  <defs><radialGradient id="aura" cx="100%" cy="0%" r="135%"><stop offset="0%" stop-color="#DFEAF7"/><stop offset="26%" stop-color="#ECF2FB"/><stop offset="55%" stop-color="#F6F9FC"/><stop offset="100%" stop-color="#FBFBFB"/></radialGradient><filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#101722" flood-opacity=".04"/><feDropShadow dx="0" dy="14" stdDeviation="17" flood-color="#101722" flood-opacity=".07"/></filter></defs>
  <rect width="1600" height="900" fill="url(#aura)"/><rect x="64" y="64" width="1472" height="772" rx="32" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <g transform="translate(106 81) scale(.30)"><path fill="#101722" d="M37 115V68C37 46 55 28 76 28H153C159 28 162 32 162 38V113C162 135 145 151 124 151H115C111 151 108 148 108 144V130C108 126 111 123 115 123H123C129 123 132 119 132 113V63C132 59 129 56 125 56H79C72 56 67 61 67 68V113C67 116 65 117 62 117H39C38 117 37 116 37 115Z"/><circle cx="87.5" cy="137.5" r="14.99" fill="#0071E3"/></g>
  <text x="180" y="122" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="22" fill="#101722">Deep<tspan fill="#0071E3">Wheel</tspan></text><text x="1494" y="118" text-anchor="end" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="13" fill="#5C626B" letter-spacing="2.6">CONFIG UPDATE</text><line x1="106" y1="158" x2="1494" y2="158" stroke="#E1E6EE"/>
  <text x="112" y="224" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="14" fill="#5C626B" letter-spacing="2.4">SET ONCE · CHECK ANYTIME</text>
  <text x="112" y="294" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="46" fill="#101722">自动更新开启一次就够</text>
  <text x="112" y="344" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="400" font-size="23" fill="#42474F">想立即检查时，点击配置名称，再选择“更新”。</text>
  <line x1="304" y1="506" x2="692" y2="506" stroke="#E1E6EE" stroke-width="2"/><path d="M682 498 L694 506 L682 514" fill="none" stroke="#AEB6C2" stroke-width="2"/><line x1="908" y1="506" x2="1296" y2="506" stroke="#E1E6EE" stroke-width="2"/><path d="M1286 498 L1298 506 L1286 514" fill="none" stroke="#AEB6C2" stroke-width="2"/>
  <rect x="112" y="414" width="348" height="250" rx="16" fill="#FFFFFF" stroke="#E1E6EE" stroke-width="1.5"/><text x="146" y="458" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="13" fill="#5C626B" letter-spacing="1.7">STEP 01 · 设置一次</text><text x="146" y="508" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="26" fill="#101722">设置 → 订阅 → 配置</text><text x="146" y="552" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="16" fill="#42474F">自动后台更新：开启</text><text x="146" y="584" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="16" fill="#42474F">更新提醒：开启</text><text x="146" y="616" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="16" fill="#42474F">更新间隔：3天</text>
  <rect x="626" y="390" width="348" height="298" rx="16" fill="#FFFFFF" stroke="#0071E3" stroke-width="2"/><rect x="626" y="390" width="348" height="9" rx="4.5" fill="#0071E3"/><text x="660" y="442" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="13" fill="#0071E3" letter-spacing="1.7">STEP 02 · 手动检查</text><text x="660" y="499" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="28" fill="#101722">点击配置名称</text><text x="660" y="539" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="16" fill="#42474F">操作菜单会直接出现。</text><rect x="660" y="574" width="280" height="48" rx="24" fill="#0071E3"/><text x="800" y="605" text-anchor="middle" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="17" fill="#FFFFFF">更新</text><text x="660" y="656" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="14" fill="#5C626B">不是点击右侧符号</text>
  <rect x="1140" y="414" width="348" height="250" rx="16" fill="#FFFFFF" stroke="#E1E6EE" stroke-width="1.5"/><text x="1174" y="458" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="13" fill="#5C626B" letter-spacing="1.7">STEP 03 · 核对</text><text x="1174" y="515" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="28" fill="#101722">点击“预览”</text><rect x="1174" y="546" width="280" height="80" rx="12" fill="#F2F5F9"/><text x="1196" y="578" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-size="14" fill="#5C626B"># CN Direct by DeepWheel</text><text x="1196" y="607" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="14" fill="#101722"># 版本：0.2.0</text><text x="1174" y="651" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="14" fill="#5C626B">看到新版本即可关闭预览</text>
  <line x1="112" y1="732" x2="1488" y2="732" stroke="#E1E6EE" stroke-width="1.5"/><text x="112" y="780" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="17" fill="#101722">注意</text><text x="188" y="780" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="17" fill="#42474F">后台更新时间由系统调度；强制退出Shadowrocket后可能延后。</text>
</svg>
