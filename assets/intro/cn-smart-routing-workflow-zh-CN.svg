<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">CN Direct by DeepWheel 三步安装图</title>
  <desc id="desc">准备自己的节点，通过稳定远程地址导入配置，点击配置文件名称并选择使用配置，最后回到首页使用配置模式。</desc>
  <defs><radialGradient id="aura" cx="100%" cy="0%" r="135%"><stop offset="0%" stop-color="#DFEAF7"/><stop offset="30%" stop-color="#ECF2FB"/><stop offset="65%" stop-color="#F6F9FC"/><stop offset="100%" stop-color="#FBFBFB"/></radialGradient><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#101722" flood-opacity=".04"/><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#101722" flood-opacity=".07"/></filter></defs>
  <rect width="1200" height="1500" fill="url(#aura)"/><rect x="44" y="44" width="1112" height="1412" rx="34" fill="#FFFFFF" filter="url(#shadow)"/>
  <g transform="translate(82 68) scale(.34)"><path fill="#101722" d="M37 115V68C37 46 55 28 76 28H153C159 28 162 32 162 38V113C162 135 145 151 124 151H115C111 151 108 148 108 144V130C108 126 111 123 115 123H123C129 123 132 119 132 113V63C132 59 129 56 125 56H79C72 56 67 61 67 68V113C67 116 65 117 62 117H39C38 117 37 116 37 115Z"/><circle cx="87.5" cy="137.5" r="14.99" fill="#0071E3"/></g>
  <text x="166" y="116" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="25" fill="#101722">Deep<tspan fill="#0071E3">Wheel</tspan></text><text x="1118" y="112" text-anchor="end" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="14" fill="#5C626B" letter-spacing="2.4">FIRST RUN</text><line x1="82" y1="150" x2="1118" y2="150" stroke="#E1E6EE"/>
  <text x="82" y="224" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#5C626B" letter-spacing="2.4">ONE PATH · THREE STEPS</text>
  <text x="82" y="304" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="58" fill="#101722">照着三步做。</text>
  <text x="82" y="372" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="58" fill="#101722">以后只选节点。</text>
  <text x="82" y="422" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="23" fill="#42474F">唯一推荐：通过稳定远程 URL 导入。</text>

  <rect x="82" y="486" width="1036" height="224" rx="22" fill="#F2F5F9"/>
  <text x="118" y="538" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#5C626B" letter-spacing="1.8">STEP 01</text>
  <text x="118" y="596" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="34" fill="#101722">先准备自己的节点</text>
  <text x="118" y="642" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="21" fill="#42474F">更新机场订阅，并在首页选择一个已经可用的节点。</text>
  <text x="118" y="678" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="18" fill="#5C626B">本项目不提供、读取或保存订阅。</text>

  <line x1="600" y1="710" x2="600" y2="750" stroke="#E1E6EE" stroke-width="3"/><path d="M590 740 L600 752 L610 740" fill="none" stroke="#AEB6C2" stroke-width="3"/>
  <rect x="82" y="752" width="1036" height="300" rx="22" fill="#FFFFFF" stroke="#0071E3" stroke-width="3"/><rect x="82" y="752" width="12" height="300" rx="6" fill="#0071E3"/>
  <text x="126" y="810" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#0071E3" letter-spacing="1.8">STEP 02 · 关键一步</text>
  <text x="126" y="872" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="36" fill="#101722">远程导入，再点击配置名称</text>
  <text x="126" y="922" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="21" fill="#42474F">配置页添加稳定 URL；导入后，点击文件名称。</text>
  <rect x="126" y="956" width="746" height="58" rx="15" fill="#F2F5F9"/><circle cx="160" cy="985" r="8" fill="#0071E3"/><text x="184" y="993" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="600" font-size="19" fill="#101722">CN-Direct-DeepWheel.conf</text>
  <text x="1084" y="990" text-anchor="end" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="18" fill="#0071E3">点击文件名</text>

  <line x1="600" y1="1052" x2="600" y2="1092" stroke="#E1E6EE" stroke-width="3"/><path d="M590 1082 L600 1094 L610 1082" fill="none" stroke="#AEB6C2" stroke-width="3"/>
  <rect x="82" y="1094" width="1036" height="224" rx="22" fill="#F2F5F9"/>
  <text x="118" y="1146" font-family="'Avenir Next','Inter','PingFang SC',sans-serif" font-weight="700" font-size="16" fill="#5C626B" letter-spacing="1.8">STEP 03</text>
  <text x="118" y="1204" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="34" fill="#101722">选择“使用配置”</text>
  <text x="118" y="1250" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="21" fill="#42474F">回到首页，将全局路由设为“配置”，开启 Shadowrocket。</text>
  <rect x="846" y="1144" width="228" height="70" rx="35" fill="#0071E3"/><text x="960" y="1188" text-anchor="middle" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="22" fill="#FFFFFF">使用配置</text>

  <line x1="82" y1="1362" x2="1118" y2="1362" stroke="#E1E6EE"/>
  <text x="82" y="1408" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-weight="600" font-size="19" fill="#101722">记住</text><text x="146" y="1408" font-family="'Avenir Next','PingFang SC','Inter',sans-serif" font-size="19" fill="#42474F">配置负责分流；首页仍负责选节点。</text>
</svg>
